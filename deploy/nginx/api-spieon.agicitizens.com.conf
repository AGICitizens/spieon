# Spieon backend — nginx vhost for api-spieon.agicitizens.com
#
# Layout:
#   - HTTP (:80)  → redirect to HTTPS, except /.well-known/acme-challenge for certbot.
#   - HTTPS (:443) → terminate TLS, reverse-proxy to FastAPI on 127.0.0.1:8000.
#   - /ws/ uses HTTP/1.1 + Upgrade headers so the narration WebSocket can hand off.
#
# Install:
#   sudo cp deploy/nginx/api-spieon.agicitizens.com.conf /etc/nginx/sites-available/
#   sudo ln -s /etc/nginx/sites-available/api-spieon.agicitizens.com.conf \
#              /etc/nginx/sites-enabled/
#   sudo certbot --nginx -d api-spieon.agicitizens.com
#   sudo nginx -t && sudo systemctl reload nginx

# ----------------------------------------------------------------------------
# Connection-upgrade map for WebSockets. Lives at http{} scope; nginx merges
# duplicate maps so it's safe to leave here.
# ----------------------------------------------------------------------------
map $http_upgrade $connection_upgrade {
    default upgrade;
    ''      close;
}

# ----------------------------------------------------------------------------
# HTTP → HTTPS redirect
# ----------------------------------------------------------------------------
server {
    listen 80;
    listen [::]:80;
    server_name api-spieon.agicitizens.com;

    # Allow Let's Encrypt HTTP-01 challenges through unencrypted.
    location /.well-known/acme-challenge/ {
        root /var/www/certbot;
    }

    location / {
        return 301 https://$host$request_uri;
    }
}

# ----------------------------------------------------------------------------
# HTTPS — reverse proxy to FastAPI / uvicorn
# ----------------------------------------------------------------------------
server {
    listen 443 ssl;
    listen [::]:443 ssl;
    http2 on;
    server_name api-spieon.agicitizens.com;

    # certbot --nginx will fill these in. Verify the paths match.
    ssl_certificate     /etc/letsencrypt/live/api-spieon.agicitizens.com/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/api-spieon.agicitizens.com/privkey.pem;
    ssl_protocols TLSv1.2 TLSv1.3;
    ssl_prefer_server_ciphers off;

    # Scan workflows can stream narration / wait on chain RPCs for a while.
    # Keep these generous — uvicorn handles its own request-level limits.
    proxy_read_timeout  300s;
    proxy_send_timeout  300s;
    client_max_body_size 4m;

    # Standard reverse-proxy headers so FastAPI sees the real client.
    proxy_set_header Host              $host;
    proxy_set_header X-Real-IP         $remote_addr;
    proxy_set_header X-Forwarded-For   $proxy_add_x_forwarded_for;
    proxy_set_header X-Forwarded-Proto $scheme;

    # ------------------------------------------------------------------------
    # WebSockets — narration stream lives at /ws/scans/{id}.
    # Must come BEFORE the catch-all `location /` block so it wins routing.
    # ------------------------------------------------------------------------
    location /ws/ {
        proxy_pass http://127.0.0.1:8000;
        proxy_http_version 1.1;
        proxy_set_header Upgrade    $http_upgrade;
        proxy_set_header Connection $connection_upgrade;

        # WS connections idle between events; keep the channel open longer than
        # the app-level 15s ping interval (see backend/app/api/ws.py).
        proxy_read_timeout 3600s;
        proxy_send_timeout 3600s;
        proxy_buffering off;
    }

    # ------------------------------------------------------------------------
    # Everything else — regular HTTP API.
    # ------------------------------------------------------------------------
    location / {
        proxy_pass http://127.0.0.1:8000;
        proxy_http_version 1.1;
        proxy_buffering off;
    }
}
