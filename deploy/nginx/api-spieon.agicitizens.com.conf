# Spieon backend — nginx vhost for api-spieon.agicitizens.com
#
# Ships HTTP-only. After install, run:
#     sudo certbot --nginx -d api-spieon.agicitizens.com
# certbot will:
#   - Solve the HTTP-01 challenge using this server block (it's already up on :80).
#   - Append `listen 443 ssl;` directives + `ssl_certificate` / `ssl_certificate_key`
#     to this same server block, so all our location blocks (including the WS
#     upgrade one) work over TLS automatically.
#   - Add a small redirect server so plain HTTP requests bounce to HTTPS.
# Renewals run from the package's certbot.timer + nginx reload hook, so this
# vhost stays untouched once the cert is in place.

# ----------------------------------------------------------------------------
# Connection-upgrade map for WebSockets. Lives at http{} scope; nginx merges
# duplicate maps so it's safe to leave here.
# ----------------------------------------------------------------------------
map $http_upgrade $connection_upgrade {
    default upgrade;
    ''      close;
}

server {
    listen 80;
    listen [::]:80;
    server_name api-spieon.agicitizens.com;

    # Scan workflows can stream narration / wait on chain RPCs for a while.
    # Keep these generous — uvicorn handles its own request-level limits.
    proxy_read_timeout  300s;
    proxy_send_timeout  300s;
    client_max_body_size 4m;

    # Standard reverse-proxy headers so FastAPI sees the real client.
    proxy_set_header Host              $host;
    proxy_set_header X-Real-IP         $remote_addr;
    proxy_set_header X-Forwarded-For   $proxy_add_x_forwarded_for;
    proxy_set_header X-Forwarded-Proto $scheme;

    # ------------------------------------------------------------------------
    # WebSockets — narration stream lives at /ws/scans/{id}.
    # Must come BEFORE the catch-all `location /` block so it wins routing.
    # ------------------------------------------------------------------------
    location /ws/ {
        proxy_pass http://127.0.0.1:8000;
        proxy_http_version 1.1;
        proxy_set_header Upgrade    $http_upgrade;
        proxy_set_header Connection $connection_upgrade;

        # WS connections idle between events; keep the channel open longer than
        # the app-level 15s ping interval (see backend/app/api/ws.py).
        proxy_read_timeout 3600s;
        proxy_send_timeout 3600s;
        proxy_buffering off;
    }

    # ------------------------------------------------------------------------
    # Everything else — regular HTTP API.
    # ------------------------------------------------------------------------
    location / {
        proxy_pass http://127.0.0.1:8000;
        proxy_http_version 1.1;
        proxy_buffering off;
    }
}
